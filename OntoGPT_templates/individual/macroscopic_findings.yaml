id: http://w3id.org/ontogpt/soton_ibd_macroscopic_findings
name: soton_ibd_macroscopic_findings
title: University of Southampton IBD Macroscopic Findings Report Schema
description: >-
  A custom template for extracting and grounding clinical reports focused on IBD pathologies.
license: https://creativecommons.org/publicdomain/zero/1.0/
prefixes:
  soton_ibd_macroscopic_findings: http://w3id.org/ontogpt/soton_ibd_macroscopic_findings/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  PATO: http://purl.obolibrary.org/obo/PATO_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  SNOMEDCT: http://purl.bioontology.org/ontology/SNOMEDCT/
  ICD10CM: http://purl.bioontology.org/ontology/ICD10CM/
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  MESH: http://purl.bioontology.org/ontology/MESH/
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  linkml: https://w3id.org/linkml/
  pathology: http://w3id.org/ontogpt/soton_ibd_macroscopic_findings
keywords:
  - pathology
  - phenotype

default_prefix: soton_ibd_macroscopic_findings
default_range: string

imports:
  - linkml:types
  - core


classes:

  PathologyReport:
    tree_root: true
    description: >-
      A semicolon-delimited list of statements, each describing a pathology,
      including any diagnoses, one or more specific qualities being measured
      and the anatomical location or tissue the pathology is measured in. Each
      statement should describe a single condition. STRICTLY output only statements in the specified format. Do not include any explanations, reasoning, colons, or additional text.
    attributes:
      pathology_statements:
        description: >-
          A semicolon-delimited list of pathology statements, capturing each observed 
          pathology as well as any normal findings or negative statements. Include all 
          diagnoses, anatomical locations, and specific qualities measured. Where findings 
          are noted as absent or within normal limits, retain these details as separate 
          statements. Ensure each pathology statement captures all relevant features, 
          even if minor or non-specific (e.g., 'no granuloma,' 'normal ileal appearance'). 
          For example, statements like 'no granulomas or viropathic changes' should be 
          split to 'no granulomas' and 'no viropathic changes,' each as individual items in the list. STRICTLY output only statements in the specified format. Do not include any explanations, reasoning, colons, or additional text.
        range: PathologyStatement
        multivalued: true     

  PathologyStatement:
    description: >-
      A statement that describes a pathology, including any diagnoses,
      one or more specific qualities being measured and the anatomical
      location or tissue the pathology is measured in.
    attributes:
      diagnosis:
        description: >-
          Extract only the main diagnosis or pathology finding term. This should be a single term, for example, 
          'thickening,' 'inflammation,' 'vascular congestion,' 'unremarkable,' 'stricture,' or 'fistula.' If the finding is normal, return 'Normal' only e.g., 
          "the terminal ileum biopsies are within normal limits". 
          Do not include qualifiers, locations, severity, explanations, or multiple findings; provide just one finding term 
          without any additional details. For instance, 'active colitis' should be simplified to 'colitis,' and 
          'no severe swelling in abdomen' should be returned as 'swelling.' Do not include multiple findings at once, and explanatory phrases. STRICTLY output only diagnoses in the specified format. Do not include any explanations, reasoning, colons, or additional text.
        range: Diagnosis
        annotations:
          prompt.example: colitis, inflammation, dysplasia, trauma, fracture, occlusion, contusions, free fluid
      qualifiers:
        description: >-
          A semicolon-delimited list of descriptors other than those for
          severity. For example "active patchy colitis" should be "active, patchy".
          Do not include negation, anatomical regions, or severity in this field. 
          If not specified, this value must be "Not Specified". Do not include explanatory phrases. STRICTLY output only qualifiers in the specified format. Do not include any explanations, reasoning, colons, or additional text.
        range: string
        annotations:
          prompt.example: active, chronic, focal, possible, some, very large, early, mild
        multivalued: true
      severity:
        description: >-
          The severity of the pathology, for example, mild, moderate, or severe.
          If not specified, this value must be "N/A". Do not include explanatory phrases 
          or descriptions. ONLY SEVERITY. STRICTLY output only severity in the specified format. Do not include any explanations, reasoning, colons, or additional text.
        range: string
        annotations:
          prompt.example: mild, moderate, severe, borderline, very mild, mild-moderate
      anatomical_entities:
        description: >-
          Semicolon-delimited list of anatomical locations or tissues
          the pathology is measured in. This may need to be inferred from the
          text, for example, "colitis" means the entity should be "colon".
          A statement of "gastric antral-type mucosa" should be changed to
          include only the anatomical entity, in this case "gastric mucosa".
          If this is not specified or cannot be inferred then this value must
          be "N/A". Only include anatomical locations or tissues, do not include 
          severity, findings, qualifiers, or explanatory phrases. STRICTLY output only anatomical entities in the specified format.
        range: AnatomicalEntity
        annotations:
          prompt.example: abdomen, pelvis, chest, left wrist, abdominal wall
        multivalued: true
      anatomical_structure:
        description: >-
          Semicolon-delimited list of specific anatomical structures within broader anatomical regions 
          where the pathology is observed. Structures are defined as distinct, larger anatomical or 
          functional areas (e.g., 'ileocolic anastomosis', 'brain', 'skull', 'vertebral bodies') or 
          general organ compartments (e.g., 'lung fields', 'diaphragm', 'abdominal cavity', 'pelvic cavity'). 
          Include terms that describe specific organs, cavities, or recognized anatomical sections, such as 
          'liver', 'uterus', or 'rectus muscle'. If a structure cannot be clearly inferred or is not specified, use "N/A". 
          Avoid smaller cellular or sub-structural terms in this field. Only include anatomical locations or tissues, 
          do not include severity, findings, qualifiers, or explanatory phrases. STRICTLY output only anatomical entities in the specified format.
        range: AnatomicalStructures
        annotations:
          prompt.example: caecal pole, bowel, kidney, wound, ileum, brain, bowel, aorta, colon, lung fields
        multivalued: true
      negative:
        description: >-
          Whether the pathology is negative or not present. This must be
          explicitly stated in the input, e.g., "no granulomas", in order
          to be true. It is otherwise false. If a pathology finding is "normal", 
          this would be false (e.g.normal appearance in the mucosa of the colon). STRICTLY output only anatomical entities in the specified format.
        range: string
        annotations:
          prompt.example: true, false

  Diagnosis:
    is_a: NamedEntity
    id_prefixes:
      - SNOMEDCT
      - ICD10CM
      - NCIT
      - MESH
      - MONDO
    annotations:
      annotators: bioportal:SNOMEDCT, bioportal:ICD10CM, sqlite:obo:ncit, sqlite:obo:mesh, sqlite:obo:mondo

  AnatomicalEntity:
    is_a: NamedEntity
    id_prefixes:
      - UBERON
    annotations:
      annotators: sqlite:obo:uberon

  AnatomicalStructures:
    is_a: NamedEntity
    id_prefixes:
      - UBERON
    annotations:
      annotators: sqlite:obo:uberon